# 1. Define a new format
log_format upstreamlog
  '$remote_addr - $remote_user [$time_local] '
  '"$request" $status $body_bytes_sent '
  '"$http_referer" "$http_user_agent" '
  '>> upstream=$upstream_addr proxy_host=$proxy_host';

# 2. Use it for the access log
access_log /var/log/nginx/access.log upstreamlog;

server {
  listen ${PORT};
  server_name localhost;
  root /usr/share/nginx/html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;

  # Ensure /drill/ routes with extensions (like .png) bypass the static files regex
  # and properly fall back to the SPA.
  location ^~ /drill/ {
    try_files $uri $uri/ /index.html;
  }

  # Serve static files
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Fingerprinted build outputs under /assets/ — safe to cache indefinitely
  location ^~ /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Root-level public files (favicon, og-images, logo) — fixed names, not fingerprinted
  location ~* \.(?:ico|png|svg|webp|woff2?)$ {
    expires 1h;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  location /api {
    proxy_pass ${BFF_APP_API_URL};
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header   "Connection" "";
  }

  # Health check endpoint
  location /health {
    access_log off;
    return 200 'healthy';
    add_header Content-Type text/plain;
  }
}
